<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter {{ counter_no }} – QUEUELESS</title>

    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">

    <style>
        body {
            background-image: url('/static/bg.jpg');
            background-size: cover;
            background-position: center;
        }
        .card {
            background: rgba(255,255,255,0.92);
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="card shadow rounded-4 p-4">

            <h2 class="text-primary mb-4">
                Counter {{ counter_no }} Token Status
            </h2>

            <table class="table table-bordered text-center">
                <thead class="table-primary">
                    <tr>
                        <th>Token No</th>
                        <th>Name</th>
                        <th>District</th>
                        <th>Panchayat</th>
                        <th>Ward</th>
                        <th>Purpose</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>

                    {% for row in tokens %}
                    <tr>
                        <td>{{ row[1] }}</td>
                        <td>{{ row[2] }}</td>
                        <td>{{ row[3] }}</td>
                        <td>{{ row[4] }}</td>
                        <td>{{ row[5] }}</td>
                        <td>{{ row[6] }}</td>
                        <td>{{ row[7] }}</td>

                        <td>
                            {% if row[7] == 'waiting' %}
                                <button onclick="serveDisplay({{ row[0] }}, event)" class="btn btn-success btn-sm">
                                    Serve
                                </button>

                                <button onclick="cancelDisplay({{ row[0] }}, event)" class="btn btn-danger btn-sm">
                                    Cancel
                                </button>

                            {% elif row[7] == 'serving' %}
                                <button onclick="doneDisplay({{ row[0] }}, event)" 
                                        class="btn btn-primary btn-sm">
                                    Done
                                </button>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}

                </tbody>
            </table>

        </div>
    </div>


<!-- ******* AJAX BUTTON SCRIPT ******* -->
<script>

function serveDisplay(id, event) {
    event.preventDefault();
    fetch("/serve/" + id)
        .then(res => res.json())
        .then(() => location.reload());  // refresh page after serving
}

function cancelDisplay(id, event) {
    event.preventDefault();
    fetch("/cancel/" + id)
        .then(res => res.json())
        .then(() => location.reload());
}

function doneDisplay(id, event) {
    event.preventDefault();
    fetch("/done/" + id)
        .then(res => res.json())
        .then(() => location.reload());
}

</script>

</body>
</html>
