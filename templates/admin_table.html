{% for row in tokens %}
<tr>
    <td>{{ row.token_number }}</td>
    <td>{{ row.counter_number }}</td>
    <td>{{ row.name }}</td>
    <td>{{ row.district }}</td>
    <td>{{ row.panchayat }}</td>
    <td>{{ row.ward }}</td>
    <td>{{ row.purpose }}</td>
    <td>{{ row.status }}</td>

    <td class="action-cell">

    {% if row.status == 'waiting' %}
        <button class="btn serve" onclick="serveToken({{ row.id }}, event)">
            Serve
        </button>

        <button class="btn cancel" onclick="cancelToken({{ row.id }}, event)">
            Cancel
        </button>
    {% endif %}

    {% if row.status == 'serving' %}
        <button class="btn done" onclick="doneToken({{ row.id }}, event)">
            Done
        </button>
    {% endif %}

    <button class="btn delete" onclick="deleteToken({{ row.id }}, event)">
        Delete
    </button>

    </td>
</tr>
{% endfor %}
